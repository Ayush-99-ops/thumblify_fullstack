version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: thumblify-backend
    ports:
      - "3000:3000"
    env_file:
      - ./server/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: thumblify-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./client/.env
    restart: unless-stopped
    depends_on:
      - server
